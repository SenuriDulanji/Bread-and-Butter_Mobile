{% extends "admin_layout.html" %}

{% block page_title %}Edit Item{% endblock %}
{% block page_subtitle %}Update menu item details{% endblock %}

{% block admin_content %}
<div class="max-w-2xl">
    <form action="{{ url_for('edit_item', item_id=item.item_id) }}" method="POST" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <div class="space-y-6">
            <div>
                <label for="item_name" class="block text-sm font-medium text-gray-700 mb-2">
                    Item Name <span class="text-red-500">*</span>
                </label>
                <input type="text" 
                       id="item_name" 
                       name="item_name" 
                       value="{{ item.bread_item_name }}"
                       required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-bread-orange focus:border-bread-orange"
                       placeholder="Enter item name">
            </div>
            
            <div>
                <label for="item_description" class="block text-sm font-medium text-gray-700 mb-2">
                    Description
                </label>
                <textarea id="item_description" 
                          name="item_description" 
                          rows="3"
                          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-bread-orange focus:border-bread-orange"
                          placeholder="Enter item description">{{ item.bread_item_description or '' }}</textarea>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="item_price" class="block text-sm font-medium text-gray-700 mb-2">
                        Price ($) <span class="text-red-500">*</span>
                    </label>
                    <input type="number" 
                           id="item_price" 
                           name="item_price" 
                           step="0.01" 
                           min="0" 
                           value="{{ item.bread_item_price }}"
                           required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-bread-orange focus:border-bread-orange"
                           placeholder="0.00">
                </div>
                
                <div>
                    <label for="item_type" class="block text-sm font-medium text-gray-700 mb-2">
                        Category <span class="text-red-500">*</span>
                    </label>
                    <select id="item_type" 
                            name="item_type" 
                            required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-bread-orange focus:border-bread-orange">
                        <option value="">Select a category</option>
                        <option value="appetizer" {% if item.bread_item_type == 'appetizer' %}selected{% endif %}>Appetizer</option>
                        <option value="main_course" {% if item.bread_item_type == 'main_course' %}selected{% endif %}>Main Course</option>
                        <option value="dessert" {% if item.bread_item_type == 'dessert' %}selected{% endif %}>Dessert</option>
                        <option value="beverage" {% if item.bread_item_type == 'beverage' %}selected{% endif %}>Beverage</option>
                        <option value="special" {% if item.bread_item_type == 'special' %}selected{% endif %}>Special</option>
                    </select>
                </div>
            </div>
            
            <div>
                <label for="item_image" class="block text-sm font-medium text-gray-700 mb-2">
                    Image URL
                </label>
                <input type="url" 
                       id="item_image" 
                       name="item_image"
                       value="{{ item.bread_item_image or '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-bread-orange focus:border-bread-orange"
                       placeholder="https://example.com/image.jpg">
                <p class="mt-1 text-sm text-gray-500">Enter the URL of the item image</p>
            </div>
            
            <!-- Current Image Display -->
            {% if item.bread_item_image %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Current Image</label>
                <div class="w-32 h-32 bg-gray-200 rounded-lg overflow-hidden">
                    <img src="{{ item.bread_item_image }}" alt="{{ item.bread_item_name }}" class="w-full h-full object-cover">
                </div>
            </div>
            {% endif %}
            
            <!-- Preview Section -->
            <div id="imagePreview" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-2">New Preview</label>
                <div class="w-32 h-32 bg-gray-200 rounded-lg overflow-hidden">
                    <img id="previewImg" src="" alt="Preview" class="w-full h-full object-cover">
                </div>
            </div>
        </div>
        
        <div class="mt-8 flex items-center justify-between">
            <a href="{{ url_for('items') }}" 
               class="px-4 py-2 text-gray-700 bg-gray-200 hover:bg-gray-300 rounded-lg transition-colors">
                Cancel
            </a>
            <div class="space-x-3">
                <button type="submit" 
                        class="px-6 py-2 bg-bread-orange text-white font-medium rounded-lg hover:bg-orange-600 transition-colors">
                    Update Item
                </button>
            </div>
        </div>
    </form>
</div>

<script>
// Image preview functionality
document.getElementById('item_image').addEventListener('input', function() {
    const imageUrl = this.value;
    const preview = document.getElementById('imagePreview');
    const previewImg = document.getElementById('previewImg');
    const currentImage = "{{ item.bread_item_image or '' }}";
    
    if (imageUrl && imageUrl !== currentImage) {
        previewImg.src = imageUrl;
        preview.classList.remove('hidden');
        
        // Handle image load error
        previewImg.onerror = function() {
            preview.classList.add('hidden');
        };
    } else {
        preview.classList.add('hidden');
    }
});

// Form validation
document.querySelector('form').addEventListener('submit', function(e) {
    const price = document.getElementById('item_price').value;
    if (parseFloat(price) < 0) {
        e.preventDefault();
        alert('Price cannot be negative');
        return false;
    }
});
</script>
{% endblock %}
