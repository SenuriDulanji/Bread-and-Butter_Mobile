{% extends "admin_layout.html" %}

{% block page_title %}Add Item{% endblock %}
{% block page_subtitle %}Add a new item to your menu{% endblock %}

{% block admin_content %}
<div class="max-w-2xl">
    <form action="{{ url_for('add_item') }}" method="POST" enctype="multipart/form-data" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <div class="space-y-6">
            <div>
                <label for="item_name" class="block text-sm font-medium text-gray-700 mb-2">
                    Item Name <span class="text-red-500">*</span>
                </label>
                <input type="text" 
                       id="item_name" 
                       name="item_name" 
                       required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-bread-orange focus:border-bread-orange"
                       placeholder="Enter item name">
            </div>
            
            <div>
                <label for="item_description" class="block text-sm font-medium text-gray-700 mb-2">
                    Description
                </label>
                <textarea id="item_description" 
                          name="item_description" 
                          rows="3"
                          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-bread-orange focus:border-bread-orange"
                          placeholder="Enter item description"></textarea>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="item_price" class="block text-sm font-medium text-gray-700 mb-2">
                        Price ($) <span class="text-red-500">*</span>
                    </label>
                    <input type="number" 
                           id="item_price" 
                           name="item_price" 
                           step="0.01" 
                           min="0" 
                           required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-bread-orange focus:border-bread-orange"
                           placeholder="0.00">
                </div>
                
                <div>
                    <label for="item_type" class="block text-sm font-medium text-gray-700 mb-2">
                        Category <span class="text-red-500">*</span>
                    </label>
                    <select id="item_type" 
                            name="item_type" 
                            required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-bread-orange focus:border-bread-orange">
                        <option value="">Select a category</option>
                        <option value="appetizer">Appetizer</option>
                        <option value="main_course">Main Course</option>
                        <option value="dessert">Dessert</option>
                        <option value="beverage">Beverage</option>
                        <option value="special">Special</option>
                    </select>
                </div>
            </div>
            
            <div>
                <label for="item_image" class="block text-sm font-medium text-gray-700 mb-2">
                    Item Image
                </label>
                <input type="file" 
                       id="item_image" 
                       name="item_image"
                       accept=".png,.jpg,.jpeg,.gif"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-bread-orange focus:border-bread-orange file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-bread-orange file:text-white hover:file:bg-orange-600">
                <p class="mt-1 text-sm text-gray-500">Upload an image file (PNG, JPG, JPEG, GIF). Max size: 16MB</p>
            </div>
            
            <!-- Preview Section -->
            <div id="imagePreview" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-2">Preview</label>
                <div class="w-32 h-32 bg-gray-200 rounded-lg overflow-hidden">
                    <img id="previewImg" src="" alt="Preview" class="w-full h-full object-cover">
                </div>
            </div>
        </div>
        
        <div class="mt-8 flex items-center justify-between">
            <a href="{{ url_for('items') }}" 
               class="px-4 py-2 text-gray-700 bg-gray-200 hover:bg-gray-300 rounded-lg transition-colors">
                Cancel
            </a>
            <button type="submit" 
                    class="px-6 py-2 bg-bread-orange text-white font-medium rounded-lg hover:bg-orange-600 transition-colors">
                Add Item
            </button>
        </div>
    </form>
</div>

<script>
// Image preview functionality for file input
document.getElementById('item_image').addEventListener('change', function() {
    const file = this.files[0];
    const preview = document.getElementById('imagePreview');
    const previewImg = document.getElementById('previewImg');
    
    if (file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = function(e) {
            previewImg.src = e.target.result;
            preview.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
    } else {
        preview.classList.add('hidden');
    }
});

// Form validation
document.querySelector('form').addEventListener('submit', function(e) {
    const price = document.getElementById('item_price').value;
    if (parseFloat(price) < 0) {
        e.preventDefault();
        alert('Price cannot be negative');
        return false;
    }
    
    const file = document.getElementById('item_image').files[0];
    if (file && file.size > 16 * 1024 * 1024) {
        e.preventDefault();
        alert('File size cannot exceed 16MB');
        return false;
    }
});
</script>
{% endblock %}
